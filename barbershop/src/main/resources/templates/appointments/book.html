<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>TRIM - Review Booking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-6">
      <h2
        class="text-3xl font-bold text-center font-['nirmala-text'] mb-2 uppercase"
      >
        Review Booking
      </h2>

      <div class="bg-white rounded-2xl p-4 mb-6 space-y-2 shadow-lg">
        <div class="flex justify-between items-start mb-2">
          <div>
            <h3
              class="text-xl font-['nirmala-text'] font-bold text-black"
              th:text="${#temporals.format(date, 'MMM d') + ' at ' + #temporals.format(startTime, 'h:mm a')}"
            >
              May 9 at 9:00 AM
            </h3>
          </div>
          <span
            class="text-xl font-black font-['nirmala-text'] text-black"
            th:text="${#numbers.formatCurrency(service.price)}"
          >
            $0.00
          </span>
        </div>

        <div class="flex justify-between">
          <span
            class="text-sm font-['nirmala-text'] bg-gray-100 text-gray-600 px-2 py-0.5 rounded-md"
            th:text="${barber.firstName + ' ' + barber.lastName}"
          >
            Barber Name
          </span>
          <span
            class="text-sm font-['nirmala-text'] bg-gray-100 text-gray-600 px-2 py-0.5 rounded-md"
            th:text="${service.duration + ' min'}"
          >
            30 min
          </span>
        </div>
        <div class="flex mt-1">
          <div
            class="text-sm bg-[#e3d39f]/50 px-2 py-0.5 rounded-md text-black font-['nirmala-text']"
          >
            <span th:text="${service.type}">Service Name</span>
          </div>
        </div>
      </div>

      <form
        th:action="@{/appointments/book}"
        method="post"
        class="space-y-4"
      >
        <input type="hidden" name="date" th:value="${date}" />
        <input type="hidden" name="startTime" th:value="${startTime}" />
        <input type="hidden" name="scheduleId" th:value="${scheduleId}" />
        <input type="hidden" name="serviceId" th:value="${service.serviceId}" />

        <div>
          <label class="block text-sm font-bold font-['nirmala-text'] uppercase"
            >First Name</label
          >
          <input
            type="text"
            name="clientFirstName"
            required
            class="w-full px-4 py-3 bg-gray-100 rounded-xl outline-none"
          />
        </div>
        <div>
          <label class="block text-sm font-bold font-['nirmala-text'] uppercase"
            >Last Name</label
          >
          <input
            type="text"
            name="clientLastName"
            required
            class="w-full px-4 py-3 bg-gray-100 rounded-xl outline-none"
          />
        </div>
        <div>
          <label class="block text-sm font-bold font-['nirmala-text'] uppercase"
            >Email</label
          >
          <input
            type="email"
            name="clientEmail"
            required
            class="w-full px-4 py-3 bg-gray-100 rounded-xl outline-none"
          />
        </div>
        <div>
          <label class="block text-sm font-bold font-['nirmala-text'] uppercase"
            >Phone Number</label
          >
          <input
            type="tel"
            name="clientPhone"
            required
            class="w-full px-4 py-3 bg-gray-100 rounded-xl outline-none"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-[#E3D39F] text-black hover:bg-black hover:text-white hover:scale-105 py-2.5 rounded-full font-bold font-['nirmala-text'] text-lg transition-all shadow-lg mt-2"
        >
          Book appointment
        </button>
      </form>
    </div>
  </body>
</html>
